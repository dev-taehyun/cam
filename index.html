<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>Camera</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    }

    /* ── Viewfinder ── */
    #viewfinder {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    /* ── Flash overlay ── */
    #flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.05s ease;
    }
    #flash.on { opacity: 1; }

    /* ── Hidden canvas for capture ── */
    #canvas { display: none; }

    /* ── Start screen ── */
    #start-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 50;
      gap: 16px;
    }

    #start-screen svg {
      opacity: 0.5;
    }

    #start-label {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    #open-camera-btn {
      margin-top: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px;
      color: #fff;
      font-size: 14px;
      letter-spacing: 0.06em;
      padding: 12px 32px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background 0.15s;
    }
    #open-camera-btn:hover { background: rgba(255,255,255,0.2); }

    /* ── Top bar overlay ── */
    #top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 24px 20px 0;
      display: flex;
      align-items: center;
      justify-content: center; /* 토글을 상단 중앙에 배치 */
      z-index: 20;
      background: linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, transparent 100%);
    }

    /* ── Bottom controls overlay ── */
    #bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 32px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 20;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 100%);
    }

    /* Shutter button */
    #shutter {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: transparent;
      border: 3px solid #fff;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: transform 0.08s ease;
      pointer-events: all;
    }
    #shutter::after {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.08s ease, opacity 0.08s ease;
    }
    #shutter:active { transform: scale(0.92); }
    #shutter:active::after { transform: scale(0.88); opacity: 0.85; }

    /* Camera flip button */
    #flip-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.35);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      transition: background 0.15s, transform 0.3s ease;
      pointer-events: all;
    }
    #flip-btn:hover { background: rgba(0,0,0,0.5); }
    #flip-btn.flipping { transform: rotate(180deg); }

    /* Last thumbnail placeholder */
    #thumbnail-slot {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.6);
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      pointer-events: all;
    }
    #thumbnail-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    /* ── Save toggle ── */
    #save-toggle-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: all;
    }

    #save-toggle-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      transition: color 0.2s;
      user-select: none;
    }
    #save-toggle-wrap.active #save-toggle-label {
      color: rgba(255,255,255,0.9);
    }

    /* The toggle pill */
    #save-toggle {
      position: relative;
      width: 44px;
      height: 26px;
      cursor: pointer;
    }
    #save-toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }
    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 100px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      transition: background 0.22s ease, border-color 0.22s ease;
    }
    #save-toggle input:checked + .toggle-track {
      background: #30d158;
      border-color: #30d158;
    }
    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #save-toggle input:checked ~ .toggle-thumb {
      transform: translateX(18px);
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.03em;
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      backdrop-filter: blur(10px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    #toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* ── Error ── */
    #error-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      text-align: center;
      padding: 0 32px;
      z-index: 55;
      display: none;
      line-height: 1.6;
    }

    /* Hidden on start screen */
    #top-bar, #bottom-bar { display: none; }
  </style>
</head>
<body>

  <video id="viewfinder" autoplay playsinline muted></video>

  <div id="flash"></div>

  <canvas id="canvas"></canvas>

  <div id="start-screen">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    <span id="start-label">카메라 접근 권한이 필요합니다</span>
    <button id="open-camera-btn">카메라 열기</button>
  </div>

  <div id="top-bar">
    <div id="save-toggle-wrap">
      <label id="save-toggle" for="save-checkbox" aria-label="저장">
        <input type="checkbox" id="save-checkbox">
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </label>
      <span id="save-toggle-label">저장</span>
    </div>
  </div>

  <div id="bottom-bar">
    <div id="thumbnail-slot">
      <img id="thumbnail" alt="마지막 사진">
    </div>

    <button id="shutter" aria-label="촬영"></button>

    <button id="flip-btn" aria-label="카메라 전환">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 4v6h6"/>
        <path d="M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10"/>
        <path d="M3.51 15a9 9 0 0 0 14.85 3.36L23 14"/>
      </svg>
    </button>
  </div>

  <div id="toast"></div>

  <div id="error-msg"></div>

  <script>
    'use strict';

    const viewfinder    = document.getElementById('viewfinder');
    const canvas        = document.getElementById('canvas');
    const flash         = document.getElementById('flash');
    const startScreen   = document.getElementById('start-screen');
    const startLabel    = document.getElementById('start-label');
    const openBtn       = document.getElementById('open-camera-btn');
    const topBar        = document.getElementById('top-bar');
    const bottomBar     = document.getElementById('bottom-bar');
    const shutter       = document.getElementById('shutter');
    const flipBtn       = document.getElementById('flip-btn');
    const thumbnailEl   = document.getElementById('thumbnail');
    const saveCheckbox  = document.getElementById('save-checkbox');
    const saveToggleWrap = document.getElementById('save-toggle-wrap');
    const toastEl       = document.getElementById('toast');
    const errorEl       = document.getElementById('error-msg');

    let currentStream = null;
    let facingMode    = 'environment';
    let toastTimer    = null;

    // Sync toggle wrapper active class for label color
    saveCheckbox.addEventListener('change', () => {
      saveToggleWrap.classList.toggle('active', saveCheckbox.checked);
    });

    // ── Camera init ──────────────────────────────────────────
    async function startCamera(facing = facingMode) {
      if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
      }
      const constraints = {
        audio: false,
        video: { facingMode: facing, width: { ideal: 1920 }, height: { ideal: 1080 } }
      };
      try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        window.stream = stream;
        currentStream = stream;
        viewfinder.srcObject = stream;
        facingMode = facing;
        startScreen.style.display = 'none';
        topBar.style.display = 'flex';
        bottomBar.style.display = 'flex';
        errorEl.style.display = 'none';
      } catch (err) {
        showError(err);
      }
    }

    function showError(err) {
      let msg = '카메라를 열 수 없습니다.';
      if (err.name === 'NotAllowedError') {
        msg = '카메라 권한이 거부되었습니다.<br>브라우저 설정에서 카메라 접근을 허용해 주세요.';
      } else if (err.name === 'NotFoundError') {
        msg = '카메라를 찾을 수 없습니다.';
      }
      startLabel.innerHTML = msg;
      startScreen.style.display = 'flex';
      topBar.style.display = 'none';
      bottomBar.style.display = 'none';
    }

    openBtn.addEventListener('click', () => startCamera('environment'));

    // ── Shutter ───────────────────────────────────────────────
    shutter.addEventListener('click', () => {
      if (!currentStream) return;

      const vw = viewfinder.videoWidth;
      const vh = viewfinder.videoHeight;
      canvas.width  = vw;
      canvas.height = vh;
      const ctx = canvas.getContext('2d');

      if (facingMode === 'user') {
        ctx.translate(vw, 0);
        ctx.scale(-1, 1);
      }
      ctx.drawImage(viewfinder, 0, 0, vw, vh);

      const dataUrl = canvas.toDataURL('image/jpeg', 0.95);

      triggerFlash();

      if (saveCheckbox.checked) {
        saveImage(dataUrl);
      }
      // Whether saving or not, update thumbnail with last shot
      thumbnailEl.src = dataUrl;
      thumbnailEl.style.display = 'block';
    });

    function triggerFlash() {
      flash.classList.add('on');
      setTimeout(() => flash.classList.remove('on'), 120);
    }

    function saveImage(dataUrl) {
      const filename = `photo_${formatDatetime()}.jpg`;
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      showToast('저장되었습니다');
    }

    // ── Flip camera ───────────────────────────────────────────
    flipBtn.addEventListener('click', () => {
      flipBtn.classList.add('flipping');
      setTimeout(() => flipBtn.classList.remove('flipping'), 300);
      const next = facingMode === 'environment' ? 'user' : 'environment';
      startCamera(next);
    });

    // Thumbnail click → open last photo
    document.getElementById('thumbnail-slot').addEventListener('click', () => {
      if (thumbnailEl.src && thumbnailEl.style.display !== 'none') {
        window.open(thumbnailEl.src, '_blank');
      }
    });

    // ── Toast ─────────────────────────────────────────────────
    function showToast(msg, duration = 1800) {
      clearTimeout(toastTimer);
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
    }

    // ── Helpers ───────────────────────────────────────────────
    function formatDatetime() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
    }

    document.addEventListener('contextmenu', e => e.preventDefault());
  </script>
</body>
</html>
